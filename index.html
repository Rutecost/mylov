<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para você</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay" id="overlay">
  <button id="btnStart">Site descontinuado, mas ainda tem algo aqui</button>
</div>

<div class="container" id="container">
  <h1>Oi, Lorena.</h1>
  <div id="text"></div>
  <div class="assinatura" id="assinatura">Ass: Rut</div>
</div>

<audio id="musica" loop>
  <source src="https://raw.githubusercontent.com/Rutecost/mylov/main/mp3.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const paragrafos = [
    "Sentindo sua falta em cada instante...",
    "Mais que lidar com sua ausência, é lidar também com a perda de um lar.",
    "Eu me pertenço, amo quem eu sou, mas minha casa não está completa.",
    "Às vezes a sensação é de estar flutuando sem chão.",
    "Mas que saudade de ti e da nossa vida...",
    "Hoje é um novo dia.",
    "Mas eu ainda queria te ligar à noite.",
    "O amor que você me mostrou foi um dos mais bonitos que vivi.",
    "Hoje eu encerro por aqui."
  ];

  let pIndex = 0;
  let charIndex = 0;

  const containerText = document.getElementById("text");
  const assinatura = document.getElementById("assinatura");
  const overlay = document.getElementById("overlay");
  const container = document.getElementById("container");
  const musica = document.getElementById("musica");
  const btn = document.getElementById("btnStart");

  assinatura.style.display = "none";
  container.style.display = "none";

  function start() {
    overlay.style.display = "none";
    container.style.display = "block";

    musica.play().catch(() => {});

    escreverParagrafo();
  }

  btn.addEventListener("click", start);

  function escreverParagrafo() {
    if (pIndex >= paragrafos.length) {
      assinatura.style.display = "block";
      return;
    }

    const p = document.createElement("p");
    containerText.appendChild(p);

    function escreverLetra() {
      if (charIndex < paragrafos[pIndex].length) {
        p.innerHTML += paragrafos[pIndex].charAt(charIndex);
        charIndex++;
        setTimeout(escreverLetra, 18);
      } else {
        charIndex = 0;
        pIndex++;
        setTimeout(escreverParagrafo, 400);
      }
    }

    escreverLetra();
  }

  // rastreamento (não quebra o site)
  function registrarVisita() {
    fetch("https://webhook.site/bfb740c8-e727-477e-9f8d-05786fc70023", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        data: new Date().toLocaleString(),
        dispositivo: /Mobi|Android/i.test(navigator.userAgent) ? "Celular" : "Computador"
      })
    }).catch(() => {});
  }

  registrarVisita();

});
</script>

</body>
</html>
