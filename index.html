<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para você</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay" id="overlay">
  <button onclick="start()">Site descontinuado, mas ainda tem algo aqui </button>
</div>

<div class="container" id="container">
  <h1>Oi, Lorena.</h1>
  <div id="text"></div>
  <div class="assinatura" id="assinatura">Ass: Rut</div>
</div>

<audio id="musica" loop>
  <source src="https://raw.githubusercontent.com/Rutecost/mylov/main/mp3.mp3" type="audio/mpeg">
  <source src="https://raw.githubusercontent.com/Rutecost/mylov/main/mp3.ogg" type="audio/ogg">
  <source src="https://raw.githubusercontent.com/Rutecost/mylov/main/mp3.wav" type="audio/wav">
</audio>

<script>
const paragrafos = [/* seu array inteiro mantido exatamente igual */];

let pIndex = 0;
let charIndex = 0;

const containerText = document.getElementById("text");
const assinatura = document.getElementById("assinatura");
const overlay = document.getElementById("overlay");
const musica = document.getElementById("musica");

assinatura.style.display = "none";
document.getElementById("container").style.display = "none";

function start() {
  overlay.style.display = "none";
  document.getElementById("container").style.display = "block";

  try { musica.play(); } catch (e) {}

  escreverParagrafo();
}

function escreverParagrafo() {
  if (pIndex >= paragrafos.length) {
    assinatura.style.display = "block";
    return;
  }

  const p = document.createElement("p");
  containerText.appendChild(p);

  function escreverLetra() {
    if (charIndex < paragrafos[pIndex].length) {
      p.textContent += paragrafos[pIndex].charAt(charIndex);
      charIndex++;
      setTimeout(escreverLetra, 18);
    } else {
      charIndex = 0;
      pIndex++;
      setTimeout(escreverParagrafo, 500);
    }
  }

  escreverLetra();
}

/* 🔥 RASTREAMENTO (AJUSTADO E FUNCIONAL) */
async function registrarVisita() {
  try {
    const visita = {
      data: new Date().toLocaleString(),
      pagina: window.location.href,
      userAgent: navigator.userAgent
    };

    await fetch("https://webhook.site/bfb740c8-e727-477e-9f8d-05786fc70023", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(visita)
    });

  } catch (e) {
    console.log("Erro no rastreamento");
  }
}

/* chama sem quebrar o site */
window.addEventListener("load", registrarVisita);
</script>

</body>
</html>
